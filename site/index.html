<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>印光法师文钞 · 文白对照</title>
<meta name="description" content="印光法师文钞全七册文白对照阅读：增广、续编、三编及补编。">
<meta name="theme-color" content="#f6f1e6">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&display=swap">
<!-- 安卓无楷体：白话退化为宋体会失去文白区分，用按需切片的霞鹜文楷GB兜底；
     苹果设备命中本地楷体，不会产生下载 -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cn-fontsource-lxgw-wen-kai-gb-screen@1.0.6/font.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- 顶栏：左目录 · 中标题 · 右AI -->
<header class="topbar" id="topbar">
  <button class="icon-btn" id="btn-nav" aria-label="打开目录">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M4 7h16M4 12h16M4 17h10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/></svg>
  </button>
  <button class="topbar-title" id="topbar-title" aria-label="回到首页">印光法师文钞</button>
  <button class="icon-btn" id="btn-ai" aria-label="打开AI助读">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M12 3c4.97 0 9 3.36 9 7.5 0 4.14-4.03 7.5-9 7.5-.98 0-1.92-.13-2.8-.37L5 19.5l1.04-3.05C4.18 15.1 3 12.93 3 10.5 3 6.36 7.03 3 12 3Z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/><path d="M8.5 10.5h7M8.5 13h4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
  </button>
</header>
<div class="read-progress" id="read-progress" aria-hidden="true"></div>

<!-- 左抽屉：目录树 -->
<nav class="drawer drawer-left" id="drawer-left" aria-label="目录">
  <div class="drawer-head">
    <span class="seal" aria-hidden="true">文钞</span>
    <div class="drawer-head-text">
      <strong>文钞目录</strong>
      <small id="nav-stats"></small>
    </div>
  </div>
  <div class="nav-search">
    <input type="search" id="nav-search" placeholder="搜索篇名…" autocomplete="off">
  </div>
  <div class="nav-tree" id="nav-tree" role="tree"></div>
  <div class="drawer-foot">
    <div class="pref-row">
      <span>字号</span>
      <span class="pref-btns">
        <button class="chip-btn" id="font-dec" aria-label="减小字号">小</button>
        <button class="chip-btn" id="font-inc" aria-label="增大字号">大</button>
      </span>
    </div>
    <div class="pref-row">
      <span>底色</span>
      <span class="pref-btns">
        <button class="chip-btn" id="theme-paper">纸色</button>
        <button class="chip-btn" id="theme-night">墨夜</button>
      </span>
    </div>
  </div>
</nav>

<!-- 右抽屉：AI 助读 -->
<aside class="drawer drawer-right" id="drawer-right" aria-label="AI助读">
  <div class="drawer-head">
    <div class="drawer-head-text">
      <strong>AI 助读</strong>
      <small id="ai-context">未在阅读篇目</small>
    </div>
    <button class="icon-btn" id="btn-ai-close" aria-label="关闭">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    </button>
  </div>
  <div class="ai-chips" id="ai-chips">
    <button class="chip-btn" data-q="请概述本篇的主旨大意。">本篇大意</button>
    <button class="chip-btn" data-q="请解释本篇中出现的重要佛教名相。">名相解释</button>
    <button class="chip-btn" data-q="本篇对今天的净业修学者有何指导意义？请依原文回答。">修学要点</button>
  </div>
  <div class="ai-log" id="ai-log"></div>
  <form class="ai-input" id="ai-form">
    <textarea id="ai-text" rows="1" placeholder="就本篇内容提问…"></textarea>
    <button type="submit" class="chip-btn ai-send">发送</button>
  </form>
  <p class="ai-disclaimer">回答仅供参考，义理以大师原文为准</p>
</aside>

<div class="overlay" id="overlay" hidden></div>

<!-- 中间：阅读主区 -->
<main class="reader" id="reader"></main>

<!-- 注释弹卡（底部抽出） -->
<div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
<section class="sheet" id="sheet" hidden aria-label="注释">
  <div class="sheet-handle" aria-hidden="true"></div>
  <div class="sheet-body" id="sheet-body"></div>
</section>

<script src="config.js"></script>
<script src="js/qrcode.js"></script>
<script type="module" src="js/app.js"></script>
<script src="js/share.js"></script>
</body>
</html>
