<script>
/* 影像灯箱：点击题词/法相放大查看，点任意处或 Esc 关闭 */
(function () {
  var lb = document.getElementById('lightbox');
  var img = document.getElementById('lb-img');
  var cap = document.getElementById('lb-cap');
  function open(full, text) {
    img.src = full; img.alt = text || ''; cap.textContent = text || '';
    lb.hidden = false; lb.setAttribute('aria-hidden', 'false');
    document.body.style.overflow = 'hidden';
  }
  function close() {
    lb.hidden = true; lb.setAttribute('aria-hidden', 'true');
    img.src = ''; document.body.style.overflow = '';
  }
  document.querySelectorAll('[data-full]').forEach(function (b) {
    b.addEventListener('click', function () { open(b.dataset.full, b.dataset.cap); });
  });
  lb.addEventListener('click', close);
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape' && !lb.hidden) close();
  });
})();
</script>
