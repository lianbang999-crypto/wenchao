name = "wenchao-ai"
main = "worker.js"
compatibility_date = "2026-06-14"
workers_dev = true
routes = [
  { pattern = "wenchao.foyue.org/api/ai*", zone_name = "foyue.org" }
]

# 密钥务必用 Secret 设置，切勿写在此文件或任何仓库文件里：
#   npx wrangler secret put DEEPSEEK_API_KEY      # 问答生成
#   npx wrangler secret put SILICONFLOW_API_KEY   # bge-m3 嵌入 + bge-reranker 重排序（硅基流动）
#
# 可选：第三方/服务端调用的 API key 鉴权表（JSON）。不配置则只有自家网页能用。
# 用 scripts/api_keys.sh 维护本地主表并写入，等价于：
#   npx wrangler secret put API_KEYS    # 值形如 {"<token>":{"name":"伙伴A","limit":1000}}
#
# 限流 + 答案缓存（同一个 KV）。每 IP 每日上限由 worker.js 的 DAILY_LIMIT 控制。
#   npx wrangler kv namespace create RL
[[kv_namespaces]]
binding = "RL"
id = "b96813bac7164eb8b31e843bca933825"

# 嵌入/重排序已改用硅基流动（HTTP API，见 worker.js 的 embed/rerankMatches），
# 不再依赖 Cloudflare Workers AI，故移除 [ai] 绑定。

# Vectorize：文钞知识库向量库。先创建（维度 1024 对应 bge-m3，余弦相似度）：
#   npx wrangler vectorize create wenchao-kb --dimensions=1024 --metric=cosine
[[vectorize]]
binding = "VEC"
index_name = "wenchao-kb"

# D1：混合检索的「全文(关键词)索引」。先创建，再把返回的 database_id 填到下面：
#   npx wrangler d1 create wenchao-kb-fts
# FTS5 表由 Worker 在 /index?cursor=0 时自动 DROP+CREATE，无需手工建表。
# 缺这个绑定时，混合检索自动退回纯向量召回，问答仍可用。
[[d1_databases]]
binding = "DB"
database_name = "wenchao-kb-fts"
database_id = "a6e17323-e03d-4837-93d2-aea6b893527e"

# 还需设置保护建库接口的密钥（交互输入，不入文件；调用时放 X-Index-Secret 请求头）：
#   npx wrangler secret put INDEX_SECRET
