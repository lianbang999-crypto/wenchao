<!doctype html>
<html lang="zh-Hans" data-theme="">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>问文钞 · 印光法师文钞 AI 助读</title>
<meta name="description" content="向《印光法师文钞》请教：念佛、信愿、因果、临终大事，依大师原文作答并附出处可查。">
<meta name="theme-color" content="#f6f1e6">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.webmanifest">
<!-- 分享预览卡（微信/社交） -->
<meta property="og:type" content="website">
<meta property="og:title" content="问文钞 · 印光法师文钞 AI 助读">
<meta property="og:description" content="心有所惑，皆可来问。依《印光法师文钞》原文为您解答，并附出处可查。">
<meta property="og:url" content="https://wenchao.foyue.org/ask/">
<meta name="twitter:card" content="summary">
<!-- 进入前先按本地偏好应用主题/字号，避免闪烁，并与主站一致 -->
<script>
(function () {
  try {
    var T = { paper: ['', '#f6f1e6'], plain: ['plain', '#e8e7e3'], night: ['night', '#171310'] };
    var theme = JSON.parse(localStorage.getItem('wc.theme')) || 'paper';
    var fs = JSON.parse(localStorage.getItem('wc.fs')) || 17;
    var t = T[theme] || T.paper;
    document.documentElement.dataset.theme = t[0];
    document.documentElement.style.setProperty('--fs', fs + 'px');
    document.querySelector('meta[name=theme-color]').setAttribute('content', t[1]);
  } catch (e) {}
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;900&display=swap">
<link rel="stylesheet" href="/css/app.css?v=20260621-ying2">
<style>
  /* 独立页外壳：抽屉的 .ai-log/.ai-input 布局是 .drawer-right 局部的，这里自带一套 */
  html, body { height: 100%; }
  body { margin: 0; }
  /* 实色纸背景：盖住 body 的宣纸点阵，与抽屉一致（抽屉 .drawer 亦为实色 var(--paper)） */
  .ask-shell { display: flex; flex-direction: column; height: 100dvh; max-width: 720px; margin: 0 auto;
    background: var(--paper);
    border-left: 1px solid var(--line); border-right: 1px solid var(--line); }
  .sheet-goto { text-decoration: none; display: inline-block; }
  .ask-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px;
    border-bottom: 1px solid var(--line); background: var(--paper); position: sticky; top: 0; z-index: 5; }
  .ask-head .ask-title { display: flex; flex-direction: column; line-height: 1.25; }
  .ask-head .ask-title strong { font: 600 17px var(--serif); color: var(--ink); }
  .ask-head .ask-title small { color: var(--ink-3); font-size: 12px; }
  .ask-head .ask-spacer { flex: 1; }
  .ask-back, .icon-btn { display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--paper); color: var(--ink-2); cursor: pointer; }
  .ask-back:hover, .icon-btn:hover { color: var(--cinnabar); border-color: var(--cinnabar); }
  .ask-shell .ai-log { flex: 1; }
  .ai-disclaimer { margin: 0; padding: 4px 14px 12px; color: var(--ink-3); font-size: 12px; text-align: center; }

  /* ===== 单页双态：首页态 / 对话态 ===== */
  [data-state="chat"] #ai-home { display: none; }
  [data-state="home"] #ai-log { display: none; }
  [data-state="home"] .ai-disclaimer { display: none; }

  /* 首页态：极简居中首屏（类名用 ask- 私有前缀，避开主站 .home-* 命名空间）。
     只留「问文钞 + 输入框」一个焦点，其余退成轻提示，垂直居中、大留白。 */
  .ai-home { flex: 1; overflow-y: auto; overscroll-behavior: contain;
    display: flex; flex-direction: column; justify-content: center; padding: 24px 26px 36px; }
  /* 极简：首页态弱化页头——去边框、隐藏标题，两枚角标淡到最轻 */
  [data-state="home"] .ask-head { border-bottom: 0; background: transparent; }
  [data-state="home"] .ask-head .ask-title { display: none; }
  [data-state="home"] .ask-back, [data-state="home"] #btn-ai-new {
    border-color: transparent; background: transparent; color: var(--ink-3); }
  [data-state="home"] .ask-back:hover, [data-state="home"] #btn-ai-new:hover { color: var(--cinnabar); }

  .ask-hero { text-align: center; }
  .ask-brand { margin: 0; font: 900 32px/1 var(--serif); letter-spacing: .2em; color: var(--ink); }
  .ask-lead { margin: 15px 0 0; font-size: 13px; line-height: 1.7; color: var(--ink-3); letter-spacing: .02em; }

  /* 输入框在首页态：圆角大输入框（同一个 .ai-input 节点被移入此槽） */
  #ask-input-slot { margin: 28px 0 0; }
  #ask-input-slot .ai-input { padding: 6px 6px 6px 16px; gap: 8px; align-items: center;
    border: 1px solid var(--line); border-top: 1px solid var(--line);
    background: var(--paper-2); border-radius: 16px; }
  #ask-input-slot .ai-input textarea { background: transparent; border: 0; padding: 8px 0; }
  #ask-input-slot .ai-input textarea:focus { border: 0; }
  #ask-input-slot .ai-send { border-radius: 999px; align-self: stretch; }

  /* 护栏一句话（仅文字，最轻一级） */
  .ask-trust { text-align: center; margin-top: 26px; font-size: 11px; color: var(--ink-3); letter-spacing: .04em; }
  .ask-trust i { font-style: normal; color: var(--line); margin: 0 6px; }
</style>
</head>
<body>
<main class="ask-shell" id="ask-shell" data-state="home">
  <header class="ask-head">
    <a class="ask-back" href="/" title="返回文钞" aria-label="返回文钞">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </a>
    <div class="ask-title">
      <strong>问文钞</strong>
      <small>基于印光法师文钞全集</small>
    </div>
    <span class="ask-spacer"></span>
    <button class="icon-btn" id="btn-ai-new" aria-label="新对话" title="新对话">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
  </header>

  <!-- ===== 首页态：身份首屏 ===== -->
  <section class="ai-home" id="ai-home" aria-label="问文钞首页">
    <div class="ask-hero">
      <h1 class="ask-brand">问文钞</h1>
      <p class="ask-lead">依《印光法师文钞》原文作答</p>
    </div>

    <!-- 单一输入框在首页态移入此槽 -->
    <div id="ask-input-slot"></div>

    <p class="ask-trust">据文作答<i>·</i>不妄说</p>
  </section>

  <!-- ===== 对话态 ===== -->
  <div class="ai-log" id="ai-log"></div>

  <!-- 单一输入框：首页态在 #home-input-slot，对话态移到底部 -->
  <form class="ai-input" id="ai-form">
    <textarea id="ai-text" rows="1" placeholder="心有所惑，皆可来问…"></textarea>
    <button type="submit" class="chip-btn ai-send">发送</button>
  </form>
  <p class="ai-disclaimer">回答仅供参考，请仔细核对《文钞》出处</p>
</main>

<!-- 出处弹卡（复用 app.css 的 sheet 样式） -->
<div class="sheet-backdrop" id="sheet-backdrop" hidden></div>
<section class="sheet" id="sheet" hidden aria-label="出处">
  <div class="sheet-handle" aria-hidden="true"></div>
  <div class="sheet-body" id="sheet-body"></div>
</section>

<script src="/config.js?v=20260616-ai-panel"></script>
<script src="/js/qrcode.js"></script>
<script src="/js/share.js?v=20260621-aicard2"></script>
<script type="module" src="/js/ask.js?v=20260624-home"></script>
</body>
</html>
