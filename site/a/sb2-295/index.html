<div class="para-pair"><p class="p-orig">自入空门，唯佛是念。二六时中，不令间断。</p><p class="p-trans">自从进入佛门，一心念佛。二六时中，不令间断。</p></div>
<div class="para-pair"><p class="p-orig">念之既久，心与佛合。预知时至，届期坐脱。</p><p class="p-trans">念得久了，心与佛合。预知时至，到了预定的日期就坐着往生了。</p></div>
<div class="para-pair"><p class="p-orig">欲利坤伦，特为颂赞。愿彼后代，永守懿范。</p><p class="p-trans">我想要利益女子们，特地写下偈颂赞叹。愿后代的尼众，永远遵守这位比丘尼的美好风范。</p></div>
    </article>
